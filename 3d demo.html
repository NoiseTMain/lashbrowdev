<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Demo — Lash & Brow Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Inter:wght@300;400&display=swap');

  :root {
    --ivory: #FAF7F2;
    --ink: #1C1A17;
    --copper: #A8784F;
    --copper-light: #C9A57E;
    --moss: #7A6F5D;
    --sand: #D6CFC2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--ivory); }

  #canvas-container {
    position: fixed; inset: 0;
    cursor: none;
  }

  canvas { display: block; }

  /* Překryvná vrstva s textem */
  .overlay {
    position: fixed; inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 0 8%;
    pointer-events: none;
    z-index: 10;
  }

  .copy { max-width: 520px; }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--copper);
    display: block;
    margin-bottom: 1.4rem;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(2.8rem, 5vw, 4.4rem);
    line-height: 1.06;
    letter-spacing: -0.015em;
    color: var(--ink);
    margin-bottom: 1.4rem;
  }

  h1 em {
    font-style: italic;
    color: var(--copper);
  }

  .lede {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink);
    line-height: 1.55;
    margin-bottom: 2.4rem;
    opacity: 0.85;
  }

  .btns {
    display: flex;
    gap: 1rem;
    pointer-events: auto;
  }

  .btn {
    padding: 0.9rem 2rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    text-decoration: none;
    border: 1px solid var(--ink);
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    border-radius: 2px;
  }
  .btn-primary { background: var(--ink); color: var(--ivory); }
  .btn-primary:hover { background: var(--copper); border-color: var(--copper); }
  .btn-outline { background: transparent; color: var(--ink); }
  .btn-outline:hover { background: var(--ink); color: var(--ivory); }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--copper);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.3s, height 0.3s, opacity 0.3s;
    mix-blend-mode: multiply;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--copper);
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.12s, width 0.3s, height 0.3s;
    opacity: 0.5;
  }

  /* Stats overlay dole */
  .stats {
    position: fixed;
    bottom: 3rem;
    left: 8%;
    display: flex;
    gap: 3rem;
    z-index: 10;
    pointer-events: none;
  }
  .stat-item strong {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: var(--ink);
    display: block;
  }
  .stat-item span {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--moss);
  }

  /* Hint pro pohyb myší */
  .mouse-hint {
    position: fixed;
    bottom: 3rem;
    right: 8%;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--moss);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    animation: hintPulse 2.5s ease-in-out infinite;
  }
  .mouse-hint::before {
    content: '';
    width: 20px; height: 1px;
    background: var(--copper);
    display: block;
  }
  @keyframes hintPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* Fade-in vstupní animace */
  .overlay, .stats, .mouse-hint {
    opacity: 0;
    animation: fadeIn 1.2s ease 0.8s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  @media (max-width: 768px) {
    .overlay { grid-template-columns: 1fr; align-items: flex-end; padding-bottom: 12vh; }
    h1 { font-size: 2.4rem; }
    .stats { bottom: 2rem; gap: 2rem; }
    .mouse-hint { display: none; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div class="overlay">
  <div class="copy">
    <span class="eyebrow">Lash & Brow Studio — Příbram</span>
    <h1>Krása se měří<br>v <em>desetinách</em><br>milimetru</h1>
    <p class="lede">Prodlužování řas, laminace obočí a diodová epilace s precizností řemesla.</p>
    <div class="btns">
      <a href="#" class="btn btn-primary">Rezervovat termín</a>
      <a href="#" class="btn btn-outline">Prohlédnout služby</a>
    </div>
  </div>
</div>

<div class="stats">
  <div class="stat-item"><strong>6+</strong><span>let praxe</span></div>
  <div class="stat-item"><strong>4</strong><span>specializace</span></div>
  <div class="stat-item"><strong>100%</strong><span>individuální přístup</span></div>
</div>

<div class="mouse-hint">pohybujte myší</div>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ==========================================================
   LASH & BROW STUDIO — Three.js 3D Hero Scene
   Prerekvizita: Three.js r128 z CDN (načítá se z internetu)
   ========================================================== */

window.addEventListener('load', () => {
  if (typeof THREE === 'undefined') {
    // Fallback pokud není internet
    document.getElementById('canvas-container').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;' +
      'font-family:Inter,sans-serif;color:#7A6F5D;font-size:0.85rem;letter-spacing:0.1em;' +
      'text-transform:uppercase;">Načítám 3D scénu…</div>';
    return;
  }
  initScene();
});

function initScene() {
  const container = document.getElementById('canvas-container');
  let W = window.innerWidth, H = window.innerHeight;
  let mouseX = 0, mouseY = 0;
  let targetRotX = 0, targetRotY = 0;

  /* --- Renderer --- */
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0xFAF7F2, 1);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  /* --- Scéna + kamera --- */
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
  camera.position.set(0, 0, 8);

  /* --- Světla --- */
  scene.add(new THREE.AmbientLight(0xFAF7F2, 1.0));

  const keyLight = new THREE.DirectionalLight(0xC9A57E, 1.8);
  keyLight.position.set(4, 5, 6);
  keyLight.castShadow = true;
  scene.add(keyLight);

  const rimLight = new THREE.DirectionalLight(0xD6CFC2, 0.7);
  rimLight.position.set(-5, -2, 2);
  scene.add(rimLight);

  const fillLight = new THREE.PointLight(0xFFF8F0, 0.6, 25);
  fillLight.position.set(0, -4, 5);
  scene.add(fillLight);

  /* --- Materiály --- */
  const matInk = new THREE.MeshStandardMaterial({ color: 0x1C1A17, roughness: 0.3, metalness: 0.1 });
  const matCopper = new THREE.MeshStandardMaterial({ color: 0xA8784F, roughness: 0.2, metalness: 0.6 });
  const matCopperLight = new THREE.MeshStandardMaterial({ color: 0xC9A57E, roughness: 0.25, metalness: 0.5 });
  const matIvory = new THREE.MeshStandardMaterial({ color: 0xF5F0E8, roughness: 0.65, metalness: 0.0 });
  const matIrisGlass = new THREE.MeshStandardMaterial({
    color: 0x2a2018, roughness: 0.05, metalness: 0.3, envMapIntensity: 1.0
  });

  /* ============================================================
     EYE GROUP — hlavní 3D objekt
     ============================================================ */
  const eyeGroup = new THREE.Group();
  // Posuneme doprava a mírně dolů, aby byl vidět vedle textu
  eyeGroup.position.set(2.6, -0.2, 0);
  scene.add(eyeGroup);

  /* Bělmo */
  const sclera = new THREE.Mesh(
    new THREE.SphereGeometry(1.05, 64, 64),
    matIvory
  );
  sclera.castShadow = true;
  eyeGroup.add(sclera);

  /* Duhovka */
  const iris = new THREE.Mesh(
    new THREE.CylinderGeometry(0.46, 0.46, 0.07, 64),
    matIrisGlass
  );
  iris.rotation.x = Math.PI / 2;
  iris.position.z = 0.96;
  eyeGroup.add(iris);

  /* Zornice */
  const pupil = new THREE.Mesh(
    new THREE.CylinderGeometry(0.19, 0.19, 0.05, 32),
    new THREE.MeshStandardMaterial({ color: 0x060504, roughness: 0.05, metalness: 0.2 })
  );
  pupil.rotation.x = Math.PI / 2;
  pupil.position.z = 0.99;
  eyeGroup.add(pupil);

  /* Odlesk */
  const highlight = new THREE.Mesh(
    new THREE.SphereGeometry(0.065, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0, emissive: 0xffffff, emissiveIntensity: 1.2 })
  );
  highlight.position.set(0.14, 0.13, 1.02);
  eyeGroup.add(highlight);

  /* --- Řasy (lashes) pomocí TubeGeometry --- */
  function makeLash(pts, thickness) {
    const curve = new THREE.CatmullRomCurve3(pts.map(p => new THREE.Vector3(...p)));
    // Zužující se tube — simulujeme menším poloměrem na konci
    const geo = new THREE.TubeGeometry(curve, 18, thickness, 5, false);
    return new THREE.Mesh(geo, matInk.clone());
  }

  // 9 řas nahoře – D-curl, různé délky a zakřivení
  const topLashes = [
    { pts: [[-0.60, 0.38, 0.74],[-0.78, 0.82, 0.58],[-0.88, 1.38, 0.14]], th: 0.026 },
    { pts: [[-0.42, 0.50, 0.82],[-0.52, 1.02, 0.72],[-0.54, 1.62, 0.28]], th: 0.030 },
    { pts: [[-0.22, 0.56, 0.88],[-0.24, 1.12, 0.80],[-0.20, 1.72, 0.40]], th: 0.032 },
    { pts: [[-0.02, 0.58, 0.91],[-0.02, 1.18, 0.83],[ 0.02, 1.78, 0.44]], th: 0.034 },
    { pts: [[ 0.20, 0.57, 0.90],[ 0.24, 1.14, 0.81],[ 0.26, 1.72, 0.42]], th: 0.034 },
    { pts: [[ 0.40, 0.52, 0.86],[ 0.50, 1.06, 0.74],[ 0.56, 1.62, 0.30]], th: 0.032 },
    { pts: [[ 0.57, 0.42, 0.80],[ 0.72, 0.92, 0.64],[ 0.82, 1.46, 0.16]], th: 0.028 },
    { pts: [[ 0.68, 0.28, 0.68],[ 0.88, 0.68, 0.50],[ 1.00, 1.10, 0.06]], th: 0.024 },
    // Baby lashes
    { pts: [[-0.52, 0.44, 0.78],[-0.64, 0.82, 0.66],[-0.68, 1.22, 0.32]], th: 0.016 },
    { pts: [[-0.12, 0.57, 0.89],[-0.14, 1.04, 0.80],[-0.10, 1.45, 0.42]], th: 0.018 },
    { pts: [[ 0.30, 0.54, 0.87],[ 0.38, 1.00, 0.76],[ 0.42, 1.46, 0.34]], th: 0.016 },
  ];
  topLashes.forEach(({ pts, th }) => eyeGroup.add(makeLash(pts, th)));

  // Dolní řasy – kratší
  const botLashes = [
    { pts: [[-0.54,-0.36, 0.76],[-0.68,-0.70, 0.62],[-0.72,-1.06, 0.28]], th: 0.015 },
    { pts: [[-0.28,-0.50, 0.84],[-0.32,-0.84, 0.73],[-0.28,-1.18, 0.38]], th: 0.016 },
    { pts: [[ 0.06,-0.55, 0.88],[ 0.08,-0.89, 0.77],[ 0.10,-1.22, 0.42]], th: 0.016 },
    { pts: [[ 0.36,-0.47, 0.82],[ 0.46,-0.80, 0.68],[ 0.52,-1.10, 0.26]], th: 0.015 },
    { pts: [[ 0.56,-0.33, 0.72],[ 0.70,-0.62, 0.54],[ 0.80,-0.90, 0.12]], th: 0.013 },
  ];
  botLashes.forEach(({ pts, th }) => eyeGroup.add(makeLash(pts, th)));

  /* --- Obočí (brow) — těsně nad okem --- */
  const browBase = [
    [-0.82, 0.76, 0.62], [-0.46, 1.02, 0.72],
    [ 0.00, 1.14, 0.76], [ 0.46, 1.06, 0.70], [ 0.82, 0.84, 0.56]
  ];
  for (let layer = 0; layer < 5; layer++) {
    const off = (layer - 2) * 0.038;
    const thBase = 0.038 - Math.abs(layer - 2) * 0.007;
    const pts = browBase.map(([x, y, z]) => [x, y + off * 0.6, z + off * 0.4]);
    const curve = new THREE.CatmullRomCurve3(pts.map(p => new THREE.Vector3(...p)));
    const geo = new THREE.TubeGeometry(curve, 24, thBase, 5, false);
    const brow = new THREE.Mesh(geo, matInk.clone());
    brow.material.color.set(0x1C1A17);
    eyeGroup.add(brow);
  }

  /* ============================================================
     PINZETA
     ============================================================ */
  const tweezerGroup = new THREE.Group();
  tweezerGroup.position.set(-3.2, -1.6, 0.2);
  tweezerGroup.rotation.set(0.15, 0.08, -0.35);
  scene.add(tweezerGroup);

  function makeTweezerArm(offX) {
    const pts = [];
    for (let i = 0; i <= 22; i++) {
      const t = i / 22;
      const x = offX * (1 - t * 0.92) + Math.sin(t * Math.PI) * 0.05 * Math.sign(offX);
      const y = -1.5 + t * 3.0;
      pts.push(new THREE.Vector3(x, y, 0));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    return new THREE.Mesh(new THREE.TubeGeometry(curve, 22, 0.030, 6, false), matCopper.clone());
  }

  tweezerGroup.add(makeTweezerArm(-0.13));
  tweezerGroup.add(makeTweezerArm(0.13));

  const grip = new THREE.Mesh(
    new THREE.TorusGeometry(0.13, 0.024, 8, 20, Math.PI),
    matCopperLight
  );
  grip.rotation.z = Math.PI / 2;
  grip.position.y = -1.5;
  tweezerGroup.add(grip);

  /* ============================================================
     PLOVOUCÍ ČÁSTICE (micro lashes)
     ============================================================ */
  const particleGroup = new THREE.Group();
  scene.add(particleGroup);

  const particles = [];
  for (let i = 0; i < 55; i++) {
    const len = 0.05 + Math.random() * 0.14;
    const geo = new THREE.CylinderGeometry(0.005, 0.001, len, 4);
    const mat = new THREE.MeshStandardMaterial({
      color: Math.random() > 0.55 ? 0xA8784F : 0x1C1A17,
      roughness: 0.4, metalness: 0.1,
      transparent: true, opacity: 0.2 + Math.random() * 0.55
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random() - 0.5) * 11,
      (Math.random() - 0.5) * 8,
      (Math.random() - 0.5) * 4 - 1
    );
    mesh.rotation.set(Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2);
    particleGroup.add(mesh);
    particles.push({
      mesh,
      vx: (Math.random() - 0.5) * 0.003,
      vy: -(0.0008 + Math.random() * 0.0015),  // padají jemně dolů
      vz: (Math.random() - 0.5) * 0.001,
      rx: (Math.random() - 0.5) * 0.006,
      ry: (Math.random() - 0.5) * 0.006,
      rz: (Math.random() - 0.5) * 0.004,
    });
  }

  /* ============================================================
     CUSTOM CURSOR
     ============================================================ */
  const cursorEl = document.getElementById('cursor');
  const cursorRingEl = document.getElementById('cursorRing');
  let cx = W / 2, cy = H / 2, ringX = W / 2, ringY = H / 2;

  document.addEventListener('mousemove', e => {
    cx = e.clientX; cy = e.clientY;
    mouseX = (e.clientX / W - 0.5) * 2;
    mouseY = -(e.clientY / H - 0.5) * 2;
  });

  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    mouseX = (t.clientX / W - 0.5) * 2;
    mouseY = -(t.clientY / H - 0.5) * 2;
  }, { passive: true });

  /* ============================================================
     ANIMAČNÍ SMYČKA
     ============================================================ */
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Plynulé sledování myši (spring easing)
    targetRotY += (mouseX * 0.32 - targetRotY) * 0.055;
    targetRotX += (mouseY * 0.22 - targetRotX) * 0.055;

    eyeGroup.rotation.y = targetRotY;
    eyeGroup.rotation.x = targetRotX;

    // Breathing – jemné houpání
    eyeGroup.position.y = -0.2 + Math.sin(t * 0.65) * 0.09;
    eyeGroup.position.z = Math.sin(t * 0.45) * 0.07;

    // Pinzeta – float + sleduje myš jemně
    tweezerGroup.position.y = -1.6 + Math.sin(t * 0.85 + 1.2) * 0.14;
    tweezerGroup.rotation.z = -0.35 + Math.sin(t * 0.55) * 0.06;
    tweezerGroup.rotation.y = mouseX * 0.08;

    // Částice
    particles.forEach(p => {
      p.mesh.position.x += p.vx;
      p.mesh.position.y += p.vy;
      p.mesh.position.z += p.vz;
      p.mesh.rotation.x += p.rx;
      p.mesh.rotation.y += p.ry;
      p.mesh.rotation.z += p.rz;
      // Wrap
      if (p.mesh.position.y < -5) {
        p.mesh.position.y = 5;
        p.mesh.position.x = (Math.random() - 0.5) * 11;
      }
      if (Math.abs(p.mesh.position.x) > 7) p.vx *= -1;
      if (Math.abs(p.mesh.position.z) > 4) p.vz *= -1;
    });

    // Cursor
    ringX += (cx - ringX) * 0.1;
    ringY += (cy - ringY) * 0.1;
    cursorEl.style.left = cx + 'px';
    cursorEl.style.top = cy + 'px';
    cursorRingEl.style.left = ringX + 'px';
    cursorRingEl.style.top = ringY + 'px';

    renderer.render(scene, camera);
  }
  animate();

  /* --- Resize --- */
  window.addEventListener('resize', () => {
    W = window.innerWidth; H = window.innerHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });

} // end initScene
</script>
</body>
</html>
